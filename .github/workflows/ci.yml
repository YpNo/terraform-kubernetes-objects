name: CI

on:
  pull_request:
    branches: [main]
  # Reusable: the release workflow calls this as a gate before tagging, so main
  # is never released untested. Direct push to main is intentionally NOT a
  # trigger here — release.yml runs the gate on merge.
  workflow_call:
  workflow_dispatch:

# Least-privilege: the CI jobs only need to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes. Keyed by the head
# ref + event so a PR run and a release-gate run don't cancel each other.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.14.5"
  TFLINT_VERSION: "v0.63.1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - name: tflint --init
        # Token avoids GitHub API rate limits when fetching the google ruleset.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --init
      - name: tflint
        run: tflint --recursive --format compact

  validate-test:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - name: Validate and test every module
        # A shared provider plugin cache makes the per-module init loop fast:
        # the kubernetes provider is downloaded once and reused across modules.
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          rc=0
          while IFS= read -r dir; do
            echo "::group::$dir"
            terraform -chdir="$dir" init -backend=false -no-color || rc=1
            terraform -chdir="$dir" validate -no-color || rc=1
            terraform -chdir="$dir" test -no-color || rc=1
            echo "::endgroup::"
          done < <(find modules -name versions.tf -printf '%h\n' | sort)
          exit $rc

  docs:
    name: Docs drift
    runs-on: ubuntu-latest
    # Pin terraform-docs explicitly: the terraform-docs/gh-actions image bundles
    # its own (older) binary with no override, and its table-separator style
    # differs from newer releases — causing spurious drift. Keep this in lockstep
    # with the pre-commit hook rev in .pre-commit-config.yaml.
    env:
      TERRAFORM_DOCS_VERSION: v0.23.0
      TERRAFORM_DOCS_SHA256: 80b8cd1d08b44e1182a39177adafc6901650a22e0a7f52cfeffcdbd44e8b0938
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install terraform-docs (pinned + checksum-verified)
        run: |
          tarball="terraform-docs-${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz"
          curl -fsSLo "$tarball" \
            "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/${tarball}"
          echo "${TERRAFORM_DOCS_SHA256}  ${tarball}" | sha256sum --check --strict
          mkdir -p "$HOME/.local/bin"
          tar -xzf "$tarball" terraform-docs
          install -m 0755 terraform-docs "$HOME/.local/bin/terraform-docs"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rm -f "$tarball" terraform-docs
      - name: Regenerate every module README
        # Each module dir owns a README.md with <!-- BEGIN_TF_DOCS --> markers;
        # the repo-root README is hand-written and intentionally excluded.
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            echo "::group::$dir"
            terraform-docs markdown table --output-mode inject --output-file README.md "$dir"
            echo "::endgroup::"
          done < <(find modules -name versions.tf -printf '%h\n' | sort)
      - name: Fail on docs drift
        # The job only rewrites module READMEs, so any diff under modules/ is doc drift.
        run: git diff --exit-code -- modules

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          # Modules are generic/parameterised, so findings are advisory for now.
          # Flip to "false" to make security findings block the pipeline.
          soft_fail: true
  
  trivy:  
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: modules
          framework: terraform
          quiet: true
          output_format: cli
          # Advisory for now; set to "false" to enforce.
          soft_fail: true

  # Single aggregate check to gate branch protection on. Requiring just this one
  # context stays correct even when the matrix above changes, and (because it
  # runs with `if: always()` + an explicit results check) a skipped/failed
  # upstream job correctly fails it instead of silently passing.
  ci-success:
    name: CI Success
    if: always()
    needs: [fmt, validate-test, tflint, docs, tfsec, trivy, checkov]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more CI jobs did not succeed."
          exit 1
      - run: echo "All CI jobs passed."
