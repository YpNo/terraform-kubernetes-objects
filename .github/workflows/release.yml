name: Release

# Runs after a pull request is merged into main. release-it derives the next
# semantic version from the Conventional Commit history, updates CHANGELOG.md,
# tags the commit and publishes a GitHub Release. No release is cut when the
# commits since the last tag contain nothing releasable.
on:
  push:
    branches: [main]
  workflow_dispatch: # manual release run

# release-it needs to push the release commit/tag and create the GitHub Release.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: never release an untested main.
  checks:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Release
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the tag and create the release
    # Pinned here so Renovate/maintainers bump them in one place.
    env:
      RELEASE_IT_VERSION: 20.2.0
      RELEASE_IT_CHANGELOG_VERSION: 11.0.1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      - name: Run release-it
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes \
            -p "release-it@${RELEASE_IT_VERSION}" \
            -p "@release-it/conventional-changelog@${RELEASE_IT_CHANGELOG_VERSION}" \
            release-it --ci
